<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn Build — Контакти</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #D4AF37;
            --gold-dark: #8B6508;
            --text-light: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(139,101,8,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ---- HEADER ---- */
        .header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,0.96) 0%, transparent 100%);
            backdrop-filter: blur(6px);
        }

        .logo img {
            max-width: 80px;
            height: auto;
            filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.8));
        }

        /* Centre badge */
        .header-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .header-badge .badge-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .header-badge .badge-title {
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
        }

        .header-badge .badge-title span {
            color: var(--gold);
        }

        .header-badge .badge-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .back-btn {
            background: rgba(30,30,30,0.6);
            color: var(--text-light);
            border: 2px solid var(--gold-dark);
            padding: 10px 28px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: rgba(212,175,55,0.2);
            color: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }

        /* ---- PAGE ---- */
        .page-wrapper {
            position: relative;
            z-index: 1;
            padding-top: 120px;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* INFO */
        .info-block {
            width: 100%;
            max-width: 520px;
            text-align: center;
            padding: 0 24px;
        }

        .contacts-title {
            font-size: clamp(24px, 3.5vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 36px;
            letter-spacing: 1px;
            color: #fff;
        }

        .contacts-title span { color: var(--gold); }

        .contact-block {
            margin-bottom: 26px;
            animation: fadeUp 0.8s ease forwards;
            opacity: 0;
        }

        .contact-block:nth-child(2) { animation-delay: 0.05s; }
        .contact-block:nth-child(3) { animation-delay: 0.15s; }
        .contact-block:nth-child(4) { animation-delay: 0.25s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .contact-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .phone-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #ffffff;
            font-size: clamp(20px, 2.8vw, 28px);
            font-weight: 700;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            position: relative;
            padding-bottom: 4px;
        }

        .phone-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 2px;
            background: var(--gold);
            transition: width 0.4s ease;
        }

        .phone-link:hover { color: var(--gold); }
        .phone-link:hover::after { width: 100%; }

        .phone-icon {
            width: 36px; height: 36px;
            border: 1px solid var(--gold-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
            background: rgba(212,175,55,0.05);
        }

        .phone-link:hover .phone-icon {
            border-color: var(--gold);
            background: rgba(212,175,55,0.15);
            box-shadow: 0 0 15px rgba(212,175,55,0.2);
        }

        .phone-icon svg { width: 15px; height: 15px; fill: var(--gold); }

        .address-text {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-light);
            line-height: 1.7;
        }

        .address-text strong {
            color: #fff;
            display: block;
            font-weight: 600;
            font-size: 16px;
        }

        .gold-divider {
            width: 60px; height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 24px auto;
        }

        /* ---- MAP ---- */
        .map-wrapper {
            width: 100%;
            max-width: 680px;
            margin: 40px 0 0;
            padding: 0 24px;
        }

        .map-frame {
            position: relative;
            border: 2px solid var(--gold-dark);
            box-shadow:
                0 0 0 1px rgba(212,175,55,0.12),
                0 20px 60px rgba(0,0,0,0.75),
                0 0 40px rgba(139,101,8,0.2);
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .map-frame:hover {
            border-color: var(--gold);
            box-shadow:
                0 0 0 1px rgba(212,175,55,0.3),
                0 24px 70px rgba(0,0,0,0.85),
                0 0 50px rgba(212,175,55,0.18);
        }

        .map-frame::before,
        .map-frame::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--gold);
            border-style: solid;
            z-index: 3;
            pointer-events: none;
        }

        .map-frame::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .map-frame::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        .map-frame iframe {
            width: 100%;
            height: 320px;
            border: none;
            display: block;
            filter: grayscale(25%) contrast(1.05) brightness(0.9);
            transition: filter 0.4s ease;
        }

        .map-frame:hover iframe {
            filter: grayscale(0%) brightness(1);
        }

        .map-inset {
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .map-caption {
            margin-top: 10px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-dark);
        }

        /* ---- MOBILE ---- */
        @media (max-width: 640px) {
            .header { padding: 14px 20px; }
            .header-badge .badge-title { font-size: 12px; letter-spacing: 2px; }
            .back-btn { padding: 8px 16px; font-size: 11px; }
            .map-frame iframe { height: 240px; }
        }

        @media (max-width: 420px) {
            .header-badge .badge-label { display: none; }
            .header-badge .badge-line  { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="logo2.png" alt="Brooklyn Build">
        </div>

        <!-- Badge in the centre of header -->
        <div class="header-badge">
            <span class="badge-label">Контакти</span>
            <div class="badge-line"></div>
            <span class="badge-title">Brooklyn <span>Build</span></span>
        </div>

        <a href="index.html" class="back-btn">← Назад</a>
    </header>

    <div class="page-wrapper">

        <div class="info-block">
            <h1 class="contacts-title">Наші <span>контакти</span></h1>

            <div class="contact-block">
                <div class="contact-label">Телефон</div>
                <a href="tel:+380960906699" class="phone-link">
                    <div class="phone-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
                        </svg>
                    </div>
                    +380 (96) 090 66 99
                </a>
            </div>

            <div class="gold-divider"></div>

            <div class="contact-block">
                <div class="contact-label">Адреса офісу</div>
                <div class="address-text">
                    <strong>Marina Bay Sands</strong>
                    10 Bayfront Avenue<br>
                    Singapore, 018956
                </div>
            </div>

            <div class="contact-block">
                <div class="contact-label">Графік роботи</div>
                <div class="address-text">
                    Пн — Пт: 09:00 – 18:00<br>
                    Сб: 10:00 – 14:00
                </div>
            </div>
        </div>

        <!-- Map — plain embed, no API key needed, pin works -->
        <div class="map-wrapper">
            <div class="map-frame">
                <div class="map-inset"></div>
                <iframe
                    src="https://maps.google.com/maps?q=Marina+Bay+Sands,+10+Bayfront+Avenue,+Singapore+018956&t=m&z=16&output=embed&iwloc=near"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    title="Marina Bay Sands, Singapore">
                </iframe>
            </div>
            <p class="map-caption">Marina Bay Sands, Singapore</p>
        </div>

    </div>

</body>
</html>
