<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакти — Brooklyn Build</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        
        .contact-card {
            border: 1px solid #8B6508;
            padding: 40px;
            text-align: center;
            background: #111;
            width: 80%;
            max-width: 500px;
            transition: 0.3s;
        }
        
        .map-btn {
            display: block;
            margin-top: 20px;
            padding: 15px;
            background: #8B6508;
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .map-btn:hover { background: #D4AF37; color: #000; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Контакти</h1>
        <p>+380 (96) 090 66 99</p>
        <p>Marina Bay Sands, Singapore</p>
        
        <a href="https://www.google.com/maps/place/Marina+Bay+Sands" target="_blank" class="map-btn">
            Відкрити на карті
        </a>
    </div>

    <br>
    <a href="index.html" style="color: #8B6508;">Назад на головну</a>

</body>
</html>
