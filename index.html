<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn Build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page" class="page-container">
        
        <main class="main-content">
            <div class="estate-image">
                <picture>
                    <source media="(max-width: 768px)" srcset="estateMobile.png">
                    <img src="estate.png" alt="BROOKLYN BUILD">
                </picture>
            </div>
        </main>

        <div class="content-wrapper">
            <header class="header">
                <div class="logo">
                    <img src="logo.png" alt="Логотип">
                </div>
                
                <nav class="nav-menu">
                    <div class="dropdown-wrapper">
                        <button class="nav-btn" id="services-btn">Наші послуги</button>
                        <div class="dropdown-menu hidden" id="services-dropdown">
                            <button class="sub-nav-btn">капітальне будівництво</button>
                            <button class="sub-nav-btn">інженерні мережі</button>
                            <button class="sub-nav-btn">ремонт та оздоблення</button>
                            <button class="sub-nav-btn">проектування та дизайн</button>
                            <button class="sub-nav-btn">операції з нерухомістю</button>
                        </div>
                    </div>
                    <button class="nav-btn" data-target="gallery-page">Галерея</button>
                    <button class="nav-btn" id="to-contacts-btn">Контакти</button>
                </nav>
            </header>
        </div>
    </div>

    <div id="stub-page" class="page-container hidden">
        <header class="header-stub">
            <div class="logo stub-logo">
                <img src="logo.png" alt="Логотип">
            </div>
        </header>
        <div class="stub-content">
            <button class="nav-btn back-btn">Назад</button>
        </div>
    </div>

    <div id="gallery-page" class="page-container gallery-container hidden">
        <header class="header-stub" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo stub-logo">
                <img src="logo.png" alt="Логотип">
            </div>
            <button class="nav-btn back-btn" style="margin-right: 40px;">Назад</button>
        </header>
        
        <div class="gallery-scroll-view">
            <div class="gallery-feed">
                <img src="img1.jpg" alt="Объект 1">
                <img src="img2.jpg" alt="Объект 2">
                <img src="img3.jpg" alt="Объект 3">
                <img src="img4.jpg" alt="Объект 4">
                <img src="img5.jpg" alt="Объект 5">
                <img src="img6.jpg" alt="Объект 6">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
