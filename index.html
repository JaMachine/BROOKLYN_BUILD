<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn Build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page" class="page-container">
        
        <main class="main-content">
            <div class="estate-image">
                <picture>
                    <source media="(max-width: 768px)" srcset="estateMobile.png">
                    <img src="estate.png" alt="BROOKLYN BUILD">
                </picture>
            </div>
        </main>

        <button class="menu-toggle" id="menu-toggle-btn" aria-label="Відкрити меню">
            <div class="burger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <div class="phone-widget" id="phone-widget">
            <a href="tel:+380960906699" class="phone-number">+380 (96) 090 66 99</a>
            <button class="phone-btn" id="phone-btn" aria-label="Зателефонувати">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27 11.72 11.72 0 003.74.6 1 1 0 011 1v3.5a1 1 0 01-1 1A16 16 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.72 11.72 0 00.6 3.74 1 1 0 01-.27 1.1l-2.21 2.22z"/>
                </svg>
            </button>
        </div>

        <div class="content-wrapper">
            <header class="header">
                <div class="logo">
                    <img src="logo.png" alt="Логотип">
                </div>
                
                <nav class="nav-menu" id="mobile-nav-menu">
                    <div class="menu-mobile-logo">
                        <img src="logo.png" alt="Brooklyn Build">
                    </div>

                    <div class="nav-buttons-wrapper">
                        <div class="dropdown-wrapper">
                            <button class="nav-btn" id="services-btn">Наші послуги</button>
                            <div class="dropdown-menu hidden" id="services-dropdown">
                                <button class="sub-nav-btn">капітальне будівництво</button>
                                <button class="sub-nav-btn">інженерні мережі</button>
                                <button class="sub-nav-btn">ремонт та оздоблення</button>
                                <button class="sub-nav-btn">проектування та дизайн</button>
                                <button class="sub-nav-btn">операції з нерухомістю</button>
                            </div>
                        </div>
                        <button class="nav-btn" data-target="gallery-page">Галерея</button>
                        <button class="nav-btn" id="to-contacts-btn">Контакти</button>
                    </div>
                </nav>
            </header>
        </div>
    </div>

    <div id="stub-page" class="page-container hidden">
        <header class="header-stub">
            <div class="logo stub-logo">
                <img src="logo.png" alt="Логотип">
            </div>
        </header>
        <div class="stub-content">
            <button class="nav-btn back-btn">Назад</button>
        </div>
    </div>

    <div id="gallery-page" class="page-container gallery-container hidden">
        <header class="header-stub" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo stub-logo">
                <img src="logo.png" alt="Логотип">
            </div>
            <button class="nav-btn back-btn" style="margin-right: 40px;">Назад</button>
        </header>
        
        <div class="gallery-scroll-view">
            <div class="gallery-feed">
                <img src="img1.jpg" alt="Об'єкт 1">
                <img src="img2.jpg" alt="Об'єкт 2">
                <img src="img3.jpg" alt="Об'єкт 3">
                <img src="img4.jpg" alt="Об'єкт 4">
                <img src="img5.jpg" alt="Об'єкт 5">
                <img src="img6.jpg" alt="Об'єкт 6">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
