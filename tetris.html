<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brooklyn Build — Tetris Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation; /* Отключаем зум при тапах */
    }

    :root {
        --gold: #D4AF37;
        --gold-dark: #8B6508;
        --bg-black: #0a0a0a;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden; /* Запрещаем любой скролл */
        position: fixed; /* Жесткая фиксация в окне */
        background: var(--bg-black);
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: 'Montserrat', sans-serif;
        padding: 5px;
    }

    /* Верхняя панель */
    .top-bar {
        width: 100%;
        max-width: 400px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 50px;
        flex-shrink: 0;
    }

    .game-logo img { max-height: 35px; }

    .close-btn {
        width: 40px; height: 40px;
        background: #8B6508;
        border: 2px solid var(--gold);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Поле — сжимается, если места мало */
    .game-wrapper {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        overflow: hidden;
    }

    canvas {
        background: #111;
        border: 2px solid var(--gold);
        max-height: 100%; 
        aspect-ratio: 1 / 2;
    }

    /* Нижняя панель */
    .controls-layer {
        width: 100%;
        max-width: 400px;
        height: 80px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        padding: 5px;
    }

    .arrows-group { display: flex; gap: 10px; }
    .touch-btn {
        background: rgba(30, 30, 30, 0.9);
        border: 2px solid var(--gold-dark);
        color: var(--gold);
        width: 60px; height: 60px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: 700; border-radius: 12px;
    }
    .rotate-btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); }

    .touch-btn:active { background: var(--gold); color: #000; }
</style>
</head>
<body>

    <div class="top-bar">
        <div class="game-logo">
            <img src="logo.png" alt="Brooklyn Build Logo">
        </div>
        
        <a href="index.html" class="close-btn" aria-label="Закрити гру">
            <svg viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </a>
    </div>

    <div class="score-container">
        <div class="score-label">РАХУНОК</div>
        <div id="score" class="score-value">0</div>
    </div>

    <div class="game-wrapper">
        <canvas id="tetris" width="240" height="480"></canvas>
    </div>

    <div class="controls-layer">
        <div class="arrows-group">
            <div class="touch-btn" id="touch-left">←</div>
            <div class="touch-btn" id="touch-down">↓</div>
            <div class="touch-btn" id="touch-right">→</div>
        </div>
        
        <div class="touch-btn rotate-btn" id="touch-rotate">↻</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');

        context.scale(20, 20);

        const colors = [
            null,
            '#D4AF37',
            '#F3E5AB',
            '#AA7C11',
            '#B5A642',
            '#E6CA65',
            '#996515',
            '#C5A059'
        ];

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') {
                return [
                    [0, 0, 0],
                    [1, 1, 1],
                    [0, 1, 0],
                ];
            } else if (type === 'O') {
                return [
                    [2, 2],
                    [2, 2],
                ];
            } else if (type === 'L') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [0, 3, 3],
                ];
            } else if (type === 'J') {
                return [
                    [0, 4, 0],
                    [0, 4, 0],
                    [4, 4, 0],
                ];
            } else if (type === 'I') {
                return [
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [7, 7, 0],
                    [0, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        function draw() {
            context.fillStyle = '#111';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.strokeStyle = 'rgba(212, 175, 55, 0.03)';
            context.lineWidth = 0.05;
            for(let i=0; i<12; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 24); context.stroke();
            }
            for(let i=0; i<24; i++) {
                context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        context.strokeStyle = 'rgba(255,255,255,0.3)';
                        context.lineWidth = 0.04;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
        }

        const arena = createMatrix(12, 24);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0
        };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });

        let dropIntervalId = null;

        document.getElementById('touch-left').addEventListener('click', (e) => {
            e.preventDefault();
            playerMove(-1);
        });
        
        document.getElementById('touch-right').addEventListener('click', (e) => {
            e.preventDefault();
            playerMove(1);
        });
        
        document.getElementById('touch-rotate').addEventListener('click', (e) => {
            e.preventDefault();
            playerRotate(1);
        });

        const downBtn = document.getElementById('touch-down');

        function startDropping(e) {
            e.preventDefault();
            playerDrop();
            if (!dropIntervalId) {
                dropIntervalId = setInterval(() => {
                    playerDrop();
                }, 70);
            }
        }

        function stopDropping(e) {
            e.preventDefault();
            if (dropIntervalId) {
                clearInterval(dropIntervalId);
                dropIntervalId = null;
            }
        }

        downBtn.addEventListener('touchstart', startDropping);
        downBtn.addEventListener('touchend', stopDropping);
        downBtn.addEventListener('touchcancel', stopDropping);

        downBtn.addEventListener('mousedown', startDropping);
        downBtn.addEventListener('mouseup', stopDropping);
        downBtn.addEventListener('mouseleave', stopDropping);

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
